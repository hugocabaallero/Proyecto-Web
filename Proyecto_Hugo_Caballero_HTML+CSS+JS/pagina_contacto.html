<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="imagenes/moto-gp.png">
    <title>Página de Contacto</title>
    <link rel="stylesheet" href="pagina_contacto.css">
</head>
<body id="arriba">
    <div id="container">
    <header>
        <h1>Página de Contacto</h1>
    </header>
    <nav class="menu">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="multimedia.html">Multimedia</a></li>
                <li><a href="informacion_relevante.html">Información Relevante</a></li>
                <li><a href="formulario.html">Formulario</a></li>
            </ul>
    </nav>
    
    <div class="clearfix"></div>

    <main>
        <section id="container">
            <article class="article">
                <form>
                    <fieldset>
                        <legend>Formulario de Contacto</legend>
                        <div>
                            <label for="nombre completo"><b>Nombre:</b></label>
                            <input type="text" name="nombre completo" id="nombre completo" placeholder="Nombre..." />
                        </div>

                        <div>
                            <label for="email"><b>Email:</b></label>
                            <input type="email" name="email" id="email" placeholder="Email..." />
                        </div>

                        <div>
                            <b>Motivo:</b>
                            <textarea name="motivo" aria-setsize="60" id="motivo" placeholder="Motivo"></textarea>
                        </div>
                    </fieldset>
                    <input type="submit">
                    <input type="reset">
                </form>
            </article>
            <br/>
            <hr/>
            <article class="article">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5566.915672440753!2d-6.10168761701979!3d36.69591521505744!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd0dc724ae986235%3A0x2991a0816db3f4e9!2sIES%20Almunia!5e1!3m2!1ses!2ses!4v1763671246018!5m2!1ses!2ses" width="1000" height="590" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </article>
        </section>
    </main>
